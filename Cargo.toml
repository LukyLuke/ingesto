[workspace]
resolver = "3"
members = ["exporter/*","receiver/*", "shared"]

[workspace.dependencies]
anyhow = { version = "1" }
clap = { version = "4" }
dashmap = { version = "6" }
notify = { version = "8" }
once_cell = { version = "1" }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
thiserror = { version = "2" }
tracing = { version = "0" }
tracing-subscriber = { version = "0", features = ["json", "env-filter"] }
